<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Event Listeners & Forms</title>
</head>
<body>
	<h1 class="msg"></h1>
	<form class="auth-form" method="post">
		<input type="text" name="fullName" id="fullName" placeholder="First & Last Name" style="display: none;">
		<input type="email" name="email" id="email" placeholder="Enter email">
		<input type="password" name="password" id="pwd" placeholder="Enter password">
		<button type="submit" class="submit">Authenticate</button>
		<button type="button" class="submit flipAuth">Register</button>
	</form>

	<form action="https://google.com/search">
		<!-- sends a request over and gives key of 'q' to anything going in the input -->
		<input type="text" name="q">
		<button type="submit" class="submit">Go</button>
	</form>
	<script src="./app.js"></script>
</body>
</html>
